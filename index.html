<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator case">
        <div class="calculator screen" id="screen"></div>

        <div class="calculator buttons" id="buttons">

            <button class="btn num" id="seven" value="7">7</button>
            <button class="btn num" id="eight" value="8">8</button>
            <button class="btn num" id="nine" value="9">9</button>
            <button class="btn" id="clearEntry" value="clearEntry">CE</button>
            <button class="btn" id="clear" value="clear">C</button>
            
            <button class="btn num" id="four" value="4">4</button>
            <button class="btn num" id="five" value="5">5</button>
            <button class="btn num" id="six" value="6">6</button>
            <button class="btn operator" id="plus" value="+">+</button>
            <button class="btn operator" id="minus" value="-">-</button>

            <button class="btn num" id="one" value="1">1</button>
            <button class="btn num" id="two" value="2">2</button>
            <button class="btn num" id="three" value="3">3</button>
            <button class="btn operator" id="divide" value="/">÷</button>

            <button class="btn equal span-row" id="equals" value="=">=</button>
            <button class="btn num span-col" id="zero" value="0">0</button>
            <button class="btn" id="decimal" value=".">.</button>
            <button class="btn operator" id="multiply" value="*">x</button>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
